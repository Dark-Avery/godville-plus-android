name: Bug report
description: Report reproducible application behavior.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include passwords, cookies or unpatched vulnerabilities.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
