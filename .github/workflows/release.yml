name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require an annotated tag from main
        run: |
          set -euo pipefail
          test "$(git cat-file -t "$GITHUB_REF")" = tag
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Check release metadata and bundled JavaScript
        run: |
          scripts/check-version-tag.sh "$GITHUB_REF_NAME"
          scripts/check-bundled-js.sh

      - name: Test, lint and build unsigned APK
        run: scripts/build-unsigned-release.sh

      - name: Record release dependency graph
        run: |
          mkdir -p app/build/reports
          ./gradlew :app:dependencies \
            --configuration releaseRuntimeClasspath \
            > app/build/reports/release-runtime-dependencies.txt

      - name: Upload unsigned build inputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-release-apk
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/reports/release-runtime-dependencies.txt
          if-no-files-found: error
          retention-days: 1

  sign:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: read
    steps:
      - name: Check out signing scripts and certificate identity
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download unsigned APK
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: unsigned-release-apk
          path: app/build

      - name: Restore release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.GODVILLE_PLUS_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Sign and verify APK
        env:
          GODVILLE_PLUS_KEYSTORE: ${{ runner.temp }}/release.jks
          GODVILLE_PLUS_STOREPASS: ${{ secrets.GODVILLE_PLUS_STOREPASS }}
          GODVILLE_PLUS_KEYPASS: ${{ secrets.GODVILLE_PLUS_KEYPASS }}
        run: scripts/sign-release.sh

      - name: Create release metadata
        run: |
          set -euo pipefail
          output=app/build/outputs/apk/release
          files=app/build/release-files
          sha256sum "$output/godville-plus-release.apk" \
            | sed "s#$output/##" \
            > "$output/godville-plus-release.apk.sha256"
          {
            printf 'source_commit=%s\n' "$GITHUB_SHA"
            printf 'tag=%s\n' "$GITHUB_REF_NAME"
            printf 'certificate_sha256='
            tr -d '[:space:]' < release-certificate.sha256
            printf '\n'
          } > "$output/godville-plus-release.txt"
          mkdir -p "$files"
          cp \
            "$output/godville-plus-release.apk" \
            "$output/godville-plus-release.apk.sha256" \
            "$output/godville-plus-release.txt" \
            app/build/reports/release-runtime-dependencies.txt \
            "$files/"

      - name: Upload signed release files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-release
          path: app/build/release-files/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download signed release files
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: signed-release
          path: release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/godville-plus-release.apk \
            release/godville-plus-release.apk.sha256 \
            release/godville-plus-release.txt \
            release/release-runtime-dependencies.txt \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "Godville+ ${GITHUB_REF_NAME#v}"
